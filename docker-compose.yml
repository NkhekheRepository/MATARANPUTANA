version: '3.8'

services:
  # Redis for event bus and caching
  redis:
    image: redis:7-alpine
    container_name: fo_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # PostgreSQL for persistent storage
  postgres:
    image: postgres:15-alpine
    container_name: fo_postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=finorch
      - POSTGRES_PASSWORD=finorch_secure_password_2026
      - POSTGRES_DB=financial_orchestrator
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # VN.PY Trading Engine
  vnpy_engine:
    build:
      context: .
      dockerfile: vnpy_engine/Dockerfile
    working_dir: /vnpy
    container_name: fo_vnpy_engine
    ports:
      - "5000:5000"
      - "5001:5001"
      - "8000:8000"
    volumes:
      - vnpy_memory:/vnpy/memory
      - vnpy_logs:/vnpy/logs
      - vnpy_config:/vnpy/config
      - vnpy_models:/vnpy/models
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=finorch
      - POSTGRES_PASSWORD=finorch_secure_password_2026
      - POSTGRES_DB=financial_orchestrator
      - BINANCE_API_KEY=${BINANCE_API_KEY:-}
      - BINANCE_SECRET_KEY=${BINANCE_SECRET_KEY:-}
      - BINANCE_SERVER=${BINANCE_SERVER:-TESTNET}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - TRADING_MODE=${TRADING_MODE:-paper}
      - RL_CHECKPOINT_INTERVAL=1800
      - MAX_POSITION_SIZE=${MAX_POSITION_SIZE:-10}
      - MAX_DAILY_LOSS=${MAX_DAILY_LOSS:-1000}
      - MAX_DRAWDOWN_PCT=${MAX_DRAWDOWN_PCT:-20}
      - RISK_PER_TRADE_PCT=${RISK_PER_TRADE_PCT:-1.0}
      - MAX_POSITION_PCT=${MAX_POSITION_PCT:-10.0}
      - MIN_ORDER_SIZE=${MIN_ORDER_SIZE:-0.001}
      - DEFAULT_ATR_PCT=${DEFAULT_ATR_PCT:-2.0}
      - DEFAULT_ORDER_TYPE=${DEFAULT_ORDER_TYPE:-limit}
      - ATR_PERIOD=${ATR_PERIOD:-14}
      - API_RATE_LIMIT=120
      - API_RATE_WINDOW=60
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-}
      - JWT_EXPIRE_MINUTES=60
      - API_KEYS=${API_KEYS:-}
      - SYNC_INTERVAL_SECONDS=60
      - MAX_ORDERS_PER_MINUTE=60
      - ORDER_MAX_RETRIES=3
      - ORDER_RETRY_BASE_DELAY=1.0
      - PYTHONUNBUFFERED=1
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  # Paper Trading Engine (Orchestrator)
  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile.orchestrator
    container_name: fo_orchestrator
    ports:
      - "8080:8080"
    volumes:
      - ./paper_trading:/app/paper_trading
      - ./memory:/app/memory
      - ./logs:/app/logs
      - ./config:/app/config
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=finorch
      - POSTGRES_PASSWORD=finorch_secure_password_2026
      - POSTGRES_DB=financial_orchestrator
      - BINANCE_API_KEY=${BINANCE_API_KEY:-}
      - BINANCE_SECRET_KEY=${BINANCE_SECRET_KEY:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - TRADING_MODE=${TRADING_MODE:-paper}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      vnpy_engine:
        condition: service_healthy
    restart: unless-stopped

  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: fo_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    restart: unless-stopped

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: fo_grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=grafana_secure_password_2026
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus
    restart: unless-stopped

  # Loki for log aggregation
  loki:
    image: grafana/loki:2.9.1
    container_name: fo_loki
    ports:
      - "3100:3100"
    volumes:
      - ./logs:/logs
      - ./monitoring/loki/local-config.yaml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped

  # Promtail for log shipping
  promtail:
    image: grafana/promtail:2.9.1
    container_name: fo_promtail
    volumes:
      - ./logs:/logs
      - ./monitoring/promtail/config.yaml:/etc/promtail/config.yaml
    command: -config.file=/etc/promtail/config.yaml
    depends_on:
      - loki
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:
  prometheus_data:
  grafana_data:
  vnpy_memory:
  vnpy_logs:
  vnpy_config:
  vnpy_models: